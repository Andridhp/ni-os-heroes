// ============================================================
// PERSISTENCIA - GARANTIZADA
// ============================================================
function cargar() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (parsed.usuario && parsed.usuario.nombre && parsed.usuario.nombre.trim()) {
      console.log('✓ Datos cargados:', parsed.usuario.nombre);
      return parsed;
    }
    return null;
  } catch (e) {
    console.error('Error al cargar:', e);
    return null;
  }
}

function guardar() {
  try {
    if (!state.usuario.nombre || !state.usuario.nombre.trim()) {
      console.warn('No se puede guardar: nombre vacío');
      return false;
    }
    const datosPersistir = {
      usuario: { nombre: state.usuario.nombre.trim(), totalXP: state.usuario.totalXP },
      progreso: state.progreso,
      logros: state.logros,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(datosPersistir));
    console.log('✓ Guardado:', state.usuario.nombre, '|', state.usuario.totalXP, 'XP');
    return true;
  } catch (e) {
    console.error('❌ Error al guardar:', e);
    return false;
  }
}

// ============================================================
// LÓGICA DE JUEGO
// ============================================================
function calcularNivel(xp) {
  return Math.floor(xp / XP_POR_NIVEL) + 1;
}

function xpDelNivel(xp) {
  return xp % XP_POR_NIVEL;
}

function getProgresoTema(materiaId, temaId) {
  if (!state.progreso[materiaId]) state.progreso[materiaId] = {};
  if (!state.progreso[materiaId][temaId]) {
    state.progreso[materiaId][temaId] = { intentos: 0, mejorPuntaje: 0, completado: false };
  }
  return state.progreso[materiaId][temaId];
}

function temaDesbloqueado(materia, idxTema) {
  if (idxTema === 0) return true;
  const temaAnterior = materia.temas[idxTema - 1];
  const prog = getProgresoTema(materia.id, temaAnterior.id);
  return prog.mejorPuntaje >= UMBRAL_DESBLOQUEO;
}

function totalTemasCompletados() {
  let n = 0;
  DATA.materias.forEach(m => {
    m.temas.forEach(t => {
      const prog = getProgresoTema(m.id, t.id);
      if (prog.completado) n++;
    });
  });
  return n;
}

function temasCompletadosPorMateria(materia) {
  let n = 0;
  materia.temas.forEach(t => {
    const prog = getProgresoTema(materia.id, t.id);
    if (prog.completado) n++;
  });
  return n;
}

function evaluarLogros() {
  const nuevos = [];
  function agregar(id) {
    if (!state.logros.includes(id)) {
      state.logros.push(id);
      const logro = LOGROS.find(l => l.id === id);
      if (logro) nuevos.push(logro);
    }
  }
  if (totalTemasCompletados() >= 1) agregar('primer_paso');
  let perfectos = 0;
  DATA.materias.forEach(m => m.temas.forEach(t => {
    const p = getProgresoTema(m.id, t.id);
    if (p.mejorPuntaje === 10) perfectos++;
  }));
  if (perfectos >= 1) agregar('perfecto_1');
  if (perfectos >= 5) agregar('perfecto_5');
  let materiasCompletas = 0;
  DATA.materias.forEach(m => {
    if (temasCompletadosPorMateria(m) === m.temas.length) materiasCompletas++;
  });
  if (materiasCompletas >= 1) agregar('materia_1');
  if (materiasCompletas >= 3) agregar('materia_3');
  if (materiasCompletas >= DATA.materias.length) agregar('materia_todas');
  const nivel = calcularNivel(state.usuario.totalXP);
  if (nivel >= 5) agregar('nivel_5');
  if (nivel >= 10) agregar('nivel_10');
  if (nivel >= 20) agregar('nivel_20');
  const totalTemas = totalTemasCompletados();
  if (totalTemas >= 10) agregar('temas_10');
  if (totalTemas >= 30) agregar('temas_30');
  if (totalTemas >= 63) agregar('todos_temas');
  return nuevos;
}

function lanzarConfeti() {
  const box = document.createElement('div');
  box.className = 'confetti';
  const colores = ['#F59E0B', '#22C55E', '#6366F1', '#EC4899', '#EF4444', '#06B6D4'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colores[i % colores.length];
    p.style.animationDelay = (Math.random() * 0.3) + 's';
    p.style.animationDuration = (1.5 + Math.random() * 1.2) + 's';
    box.appendChild(p);
  }
  document.body.appendChild(box);
  setTimeout(() => box.remove(), 3000);
}

// ============================================================
// UTILIDADES
// ============================================================
function el(tag, attrs = {}, children = []) {
  const n = document.createElement(tag);
  for (const k in attrs) {
    if (attrs[k] == null) continue;
    if (k === 'className') n.className = attrs[k];
    else if (k === 'innerHTML') n.innerHTML = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(n.style, attrs[k]);
    else if (typeof attrs[k] === 'boolean') {
      if (attrs[k]) n.setAttribute(k, '');
    }
    else n.setAttribute(k, attrs[k]);
  }
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null || c === false) return;
    if (typeof c === 'string' || typeof c === 'number') n.appendChild(document.createTextNode(c));
    else n.appendChild(c);
  });
  return n;
}

}

  const logrosCard = el('div', { className: 'achievements-card', onClick: () => mostrarLogrosModal() }, [

    el('div', { className: 'achievements-text', style: { flex: 1 } }, [
      el('h3', {}, ['Mis logros']),
      el('p', {}, [state.logros.length + ' de ' + LOGROS.length + ' desbloqueados'])
    ]),
    el('div', { style: { fontSize: '22px' } }, ['›'])
  ]);

  const grid = el('div', { className: 'subjects-grid' });
  DATA.materias.forEach(m => {
    const completados = temasCompletadosPorMateria(m);
    const porcentaje = (completados / m.temas.length) * 100;
    const card = el('div', { className: 'subject-card', onClick: () => {
      state.materiaActual = m.id;
      state.vista = 'subject';
      render();
    }}, [
      el('div', { className: 'subject-icon', style: { background: m.color } }, [m.icono]),
      el('h3', {}, [m.nombre]),
      el('p', {}, [m.descripcion]),
      el('div', { className: 'subject-progress' }, [
        el('div', { className: 'subject-progress-bar' }, [
          el('div', { className: 'subject-progress-fill', style: { width: porcentaje + '%', background: m.color } })
        ]),
        el('span', {}, [completados + '/' + m.temas.length])
      ])
    ]);
    grid.appendChild(card);
  });

  return el('div', {}, [
    el('div', { className: 'topbar' }, [
      el('div', { className: 'left' }, [
        el('div', {}, [
          el('div', { className: 'topbar-title' }, ['Niños Héroes APP']),
          el('div', { className: 'topbar-subtitle' }, ['1° de Secundaria'])
        ])
      ]),
      el('div', { style: { display: 'flex', gap: '8px' } }, [
        el('div', { className: 'stats-pill lvl' }, ['⚡ ' + nivel]),
        el('div', { className: 'stats-pill' }, ['🌟 ' + xp])
      ])
    ]),
    el('div', { className: 'container' }, [
      greeting,
      logrosCard,
      el('div', { className: 'section-title' }, ['Materias']),
      grid,
      el('div', { className: 'footer' }, ['Niños Héroes APP — Aprende y avanza a tu ritmo'])
    ])
  ]);
}

// ---------- Subject view ----------
function renderSubject() {
  const materia = DATA.materias.find(m => m.id === state.materiaActual);
  const temas = el('div', { className: 'topics-list' });

  materia.temas.forEach((t, idx) => {
    const desbloqueado = temaDesbloqueado(materia, idx);
    const prog = getProgresoTema(materia.id, t.id);
    const estado = prog.completado ? 'completed' : (prog.intentos > 0 ? 'in-progress' : '');
    const className = 'topic-card ' + estado + (desbloqueado ? '' : ' locked');
    const card = el('div', { className: className.trim(), onClick: () => {
      if (!desbloqueado) return;
      iniciarQuiz(materia, t, idx);
    }}, [
      el('div', { className: 'topic-number' }, [
        desbloqueado ? (prog.completado ? '✓' : String(idx + 1)) : '🔒'
      ]),
      el('div', { className: 'topic-info' }, [
        el('h3', {}, [t.nombre]),
        el('p', {}, [desbloqueado ? t.descripcion : 'Completa el tema anterior con al menos ' + UMBRAL_DESBLOQUEO + '/10'])
      ]),
      prog.intentos > 0 ?
        el('div', { className: 'topic-score' }, [prog.mejorPuntaje + '/10']) :
        el('div', { className: 'topic-score none' }, [desbloqueado ? 'Empezar' : '']),
      desbloqueado ? el('div', { className: 'topic-arrow' }, ['›']) : null
    ]);
    temas.appendChild(card);
  });

  const completados = temasCompletadosPorMateria(materia);

  return el('div', {}, [
    el('div', { className: 'topbar' }, [
      el('div', { className: 'left' }, [
        el('button', { className: 'btn-back', onClick: () => { state.vista = 'dashboard'; render(); }}, ['←']),
        el('div', {}, [
          el('div', { className: 'topbar-title' }, [materia.nombre]),
          el('div', { className: 'topbar-subtitle' }, [completados + ' / ' + materia.temas.length + ' temas'])
        ])
      ])
    ]),
    el('div', { className: 'container' }, [
      el('div', { className: 'subject-header', style: { background: 'linear-gradient(135deg, ' + materia.color + ', ' + materia.color + 'CC)' } }, [
        el('div', { className: 'badge' }, ['1° Secundaria']),
        el('h1', {}, [materia.icono + ' ' + materia.nombre]),
        el('p', {}, [materia.descripcion])
      ]),
      el('div', { className: 'section-title' }, ['Temas']),
      temas
    ])
  ]);
}

// ---------- Quiz ----------
function iniciarQuiz(materia, tema, temaIdx) {
  state.quiz = {
    materiaId: materia.id,
    temaId: tema.id,
    temaIdx: temaIdx,
    preguntas: tema.preguntas.map(p => ({ ...p })),
    indice: 0,
    puntaje: 0,
    respuestas: [],
    seleccionada: null,
    respondida: false,
  };
  state.materiaActual = materia.id;
  state.temaActual = tema.id;
  state.vista = 'quiz';
  render();
}

function renderQuiz() {
  const q = state.quiz;
  const materia = DATA.materias.find(m => m.id === q.materiaId);
  const tema = materia.temas.find(t => t.id === q.temaId);
  const pregunta = q.preguntas[q.indice];
  const total = q.preguntas.length;
  const porcentaje = (q.indice / total) * 100;

  const options = pregunta.opciones.map((opt, idx) => {
    const letras = ['A', 'B', 'C', 'D'];
    let cls = 'option-btn';
    if (q.respondida) {
      if (idx === pregunta.correcta) cls += ' correct';
      else if (idx === q.seleccionada) cls += ' wrong';
    }
    return el('button', {
      className: cls,
      disabled: q.respondida,
      onClick: () => {
        if (q.respondida) return;
        q.seleccionada = idx;
        q.respondida = true;
        const esCorrecta = idx === pregunta.correcta;
        if (esCorrecta) q.puntaje++;
        q.respuestas.push({ idx: idx, correcta: esCorrecta });
        render();
      }
    }, [
      el('div', { className: 'option-letter' }, [letras[idx]]),
      el('span', { style: { flex: 1 } }, [opt])
    ]);
  });

  let feedback = null;
  if (q.respondida) {
    const esCorrecta = q.seleccionada === pregunta.correcta;
    const letras = ['A', 'B', 'C', 'D'];
    feedback = el('div', { className: 'quiz-feedback ' + (esCorrecta ? 'correct' : 'wrong') }, [
      el('div', { className: 'quiz-feedback-text' }, [
        esCorrecta ? '¡Correcto! 🎉' : 'Respuesta incorrecta',
        esCorrecta ? null : el('small', {}, ['La correcta era: ' + letras[pregunta.correcta] + ') ' + pregunta.opciones[pregunta.correcta]])
      ]),
      el('button', { className: 'btn-continue' + (esCorrecta ? '' : ' error'), onClick: () => avanzarPregunta() }, [
        q.indice < total - 1 ? 'Siguiente' : 'Ver resultados'
      ])
    ]);
  }

  return el('div', {}, [
    el('div', { className: 'topbar' }, [
      el('div', { className: 'left' }, [
        el('button', { className: 'btn-back', onClick: () => {
          if (confirm('¿Salir del quiz? Se perderá tu progreso actual.')) {
            state.vista = 'subject'; state.quiz = null; render();
          }
        }}, ['×']),
        el('div', {}, [
          el('div', { className: 'topbar-title' }, [tema.nombre]),
          el('div', { className: 'topbar-subtitle' }, [materia.icono + ' ' + materia.nombre])
        ])
      ]),
      el('div', { className: 'stats-pill' }, ['✓ ' + q.puntaje])
    ]),
    el('div', { className: 'quiz-progress' }, [
      el('div', { className: 'quiz-progress-info' }, [
        el('span', {}, ['Pregunta ' + (q.indice + 1) + ' de ' + total]),
        el('span', {}, [Math.round(porcentaje) + '%'])
      ]),
      el('div', { className: 'quiz-progress-bar' }, [
        el('div', { className: 'quiz-progress-fill', style: { width: ((q.indice + (q.respondida ? 1 : 0)) / total * 100) + '%', background: materia.color } })
      ])
    ]),
    el('div', { className: 'quiz-body' }, [
      el('div', { className: 'quiz-question' }, [pregunta.pregunta]),
      el('div', { className: 'quiz-options' }, options),
      feedback
    ])
  ]);
}

function avanzarPregunta() {
  const q = state.quiz;
  if (q.indice < q.preguntas.length - 1) {
    q.indice++;
    q.seleccionada = null;
    q.respondida = false;
    render();
  } else {
    finalizarQuiz();
  }
}

function finalizarQuiz() {
  const q = state.quiz;
  const prog = getProgresoTema(q.materiaId, q.temaId);
  prog.intentos++;
  const mejoro = q.puntaje > prog.mejorPuntaje;
  if (mejoro) prog.mejorPuntaje = q.puntaje;
  if (q.puntaje >= UMBRAL_DESBLOQUEO) prog.completado = true;

  let xpGanado = q.puntaje * XP_POR_CORRECTA;
  if (q.puntaje === 10) xpGanado += XP_BONUS_PERFECTO;
  const esPrimero = prog.intentos === 1;
  if (esPrimero || mejoro) {
    state.usuario.totalXP += xpGanado;
  } else {
    xpGanado = Math.floor(xpGanado / 3);
    state.usuario.totalXP += xpGanado;
  }

  const nivelAntes = calcularNivel(state.usuario.totalXP - xpGanado);
  const nivelAhora = calcularNivel(state.usuario.totalXP);
  const subioDNivel = nivelAhora > nivelAntes;

  const nuevosLogros = evaluarLogros();

  state.resultadosTemp = {
    puntaje: q.puntaje,
    total: q.preguntas.length,
    xpGanado: xpGanado,
    nuevosLogros: nuevosLogros,
    perfecto: q.puntaje === 10,
    aprobado: q.puntaje >= UMBRAL_DESBLOQUEO,
    subioDNivel: subioDNivel,
    nivelNuevo: nivelAhora,
  };

  state.vista = 'results';
  state.quiz = null;
  guardar();
  if (q.puntaje >= UMBRAL_DESBLOQUEO) lanzarConfeti();
  render();
}

// ---------- Results ----------
function renderResults() {
  const r = state.resultadosTemp;
  const materia = DATA.materias.find(m => m.id === state.materiaActual);
  const tema = materia.temas.find(t => t.id === state.temaActual);

  let emoji = '🎉'; let titulo = '¡Buen trabajo!';
  if (r.perfecto) { emoji = '🏆'; titulo = '¡Perfecto!'; }
  else if (!r.aprobado) { emoji = '💪'; titulo = '¡Inténtalo otra vez!'; }
  const subtitulo = r.aprobado ? 'Completaste el tema ' + tema.nombre : 'Necesitas ' + UMBRAL_DESBLOQUEO + '/10 para desbloquear el siguiente tema';

  const elementos = [
    el('div', { className: 'topbar' }, [
      el('div', { className: 'left' }, [
        el('button', { className: 'btn-back', onClick: () => { state.vista = 'subject'; render(); }}, ['←']),
        el('div', {}, [
          el('div', { className: 'topbar-title' }, ['Resultados']),
          el('div', { className: 'topbar-subtitle' }, [tema.nombre])
        ])
      ])
    ]),
    el('div', { className: 'results' }, [
      el('div', { className: 'results-emoji' }, [emoji]),
      el('h1', {}, [titulo]),
      el('p', { className: 'subtitle' }, [subtitulo]),
    ])
  ];

  if (r.subioDNivel) {
    elementos.push(
      el('div', { className: 'level-up-banner' }, ['⭐ NIVEL ' + r.nivelNuevo + ' DESBLOQUEADO ⭐']),
      el('div', { className: 'level-up-quote' }, ['"' + FRASES_NIVEL[r.nivelNuevo] + '"'])
    );
  }

  elementos.push(
    el('div', { className: 'results-score' }, [
      el('div', {}, [
        el('span', { className: 'results-score-big' }, [String(r.puntaje)]),
        el('span', { className: 'results-score-total' }, ['/' + r.total])
      ]),
      el('div', { className: 'results-score-label' }, ['Respuestas correctas'])
    ]),
    el('div', { className: 'results-rewards' }, [
      '⚡ +' + r.xpGanado + ' XP' + (r.perfecto ? ' (¡bonus por 10/10!)' : '')
    ])
  );

  if (r.nuevosLogros.length > 0) {
    const logrosDiv = el('div', { className: 'new-achievements' }, [
      el('h3', {}, ['Nuevos logros'])
    ]);
    r.nuevosLogros.forEach(l => {
      logrosDiv.appendChild(el('div', { className: 'new-achievement-item' }, [
        el('div', { className: 'new-achievement-emoji' }, [l.emoji]),
        el('div', { className: 'new-achievement-info' }, [
          el('h4', {}, [l.nombre]),
          el('p', {}, [l.desc])
        ])
      ]));
    });
    elementos.push(logrosDiv);
  }

  elementos.push(
    el('div', { className: 'results-buttons' }, [
      r.aprobado ? el('button', { className: 'btn-primary', onClick: () => { state.vista = 'subject'; render(); }}, ['Continuar']) :
                   el('button', { className: 'btn-primary', onClick: () => {
                     const t = materia.temas.find(tt => tt.id === state.temaActual);
                     const ti = materia.temas.indexOf(t);
                     iniciarQuiz(materia, t, ti);
                   }}, ['Reintentar tema']),
      el('button', { className: 'btn-secondary', onClick: () => { state.vista = 'subject'; render(); }}, ['Volver a la materia'])
    ])
  );

  return el('div', {}, elementos);
}

// ---------- Modal de logros ----------
function mostrarLogrosModal() {
  const backdrop = el('div', { className: 'modal-backdrop', onClick: (e) => { if (e.target === backdrop) cerrar(); }});
  function cerrar() { backdrop.remove(); }
  const modal = el('div', { className: 'modal' }, [
    el('div', { className: 'modal-header' }, [
      el('h2', {}, ['🏅 Mis logros']),
      el('button', { className: 'btn-close', onClick: cerrar }, ['×'])
    ]),
  ]);
  LOGROS.forEach(l => {
    const desbloqueado = state.logros.includes(l.id);
    modal.appendChild(el('div', { className: 'achievement-item' + (desbloqueado ? '' : ' locked') }, [
      el('div', { className: 'achievement-emoji' }, [desbloqueado ? l.emoji : '🔒']),
      el('div', { className: 'achievement-info' }, [
        el('h3', {}, [l.nombre]),
        el('p', {}, [l.desc])
      ])
    ]));
  });
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
}

// ============================================================
// INICIO
// ============================================================
function iniciar() {
  state = estadoInicial();
  const guardado = cargar();
  if (guardado && guardado.usuario && guardado.usuario.nombre) {
    state.usuario = guardado.usuario;
    state.progreso = guardado.progreso || {};
    state.logros = guardado.logros || [];
    state.vista = 'dashboard';
  } else {
    state.vista = 'welcome';
  }
  render();
}

iniciar();
